# Release: git tag v0.1.0 && git push --tags
# https://goreleaser.com
version: 2

project_name: redteam

before:
  hooks:
    - bash -c 'cd redteam && go mod tidy'

builds:
  - id: redteam
    dir: redteam
    binary: redteam
    main: ./cmd/redteam
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/Ali627miya/llm-redteam/redteam/internal/version.Version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  github:
    owner: Ali627miya
    name: llm-redteam
